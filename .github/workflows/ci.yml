name: FOURIA CI

on:
  push:
    branches: ["main", "dev", "v0.*"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest

      - name: Compile all Python sources
        shell: pwsh
        run: |
          $base = "Documents/Codex/2026-06-22/files-mentioned-by-the-user-eldrae/fouria"
          python -m compileall "$base/server" "$base/fl_bridge" "$base/tests" -q

      - name: Run full test suite
        shell: pwsh
        env:
          FOURIA_TOKEN: ci-test-token-00000000000000000000
          PYTHONWARNINGS: error::ResourceWarning
        run: |
          $base = "Documents/Codex/2026-06-22/files-mentioned-by-the-user-eldrae/fouria"
          python -m pytest "$base/tests/" -v --tb=short

      - name: Verify test count (minimum 50)
        shell: pwsh
        run: |
          $base = "Documents/Codex/2026-06-22/files-mentioned-by-the-user-eldrae/fouria"
          $result = python -m pytest "$base/tests/" --collect-only -q 2>&1
          $count = ($result | Select-String "test session starts" -Context 0,100 |
                    Out-String) -replace '(?s).*?(\d+) tests?.*', '$1'
          Write-Host "Collected $($result[-2])"
